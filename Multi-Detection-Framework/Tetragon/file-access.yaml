apiVersion: cilium.io/v1alpha1
kind: TracingPolicy
metadata:
  name: file-access
spec:
  podSelector:
    matchExpressions:
    - key: "k8s:io.kubernetes.pod.namespace"
      operator: "Exists"
  kprobes:
    ####################################################################
    # security_file_open (LSM)
    - call: "security_file_open"
      syscall: false
      args:
        - index: 0
          type: "file"
      selectors:
        - matchArgs:
          - index: 0
            operator: "Postfix"
            values:
              - "/var/run/secrets/kubernetes.io/serviceaccount/token"
              - ".service"
              - "/environ"
          matchActions:
            - action: Post

        - matchArgs:
          - index: 0
            operator: "Prefix"
            values:
              - "/etc/init.d"
              - "/etc/group"
              - "/etc/passwd"
              - "/etc/sudoers"
              - "/run/secrets/kubernetes.io/serviceaccount"
              - "/var/run/secrets/kubernetes.io/serviceaccount"
              - "/root/.kube/config"
              - "/home/root/.kube/config"
              - "/etc/kubernetes/pki"
              - "/var/lib/kubelet/pki"
              - "/dev/shm"
              - "/root/.ssh"
              - "/home/root/.ssh"
              - "/etc/ssh"
              - "/id_rsa"
          matchActions:
            - action: Post

        - matchArgs:
          - index: 0
            operator: "Equal"
            values:
              - "/etc/shadow"
              - "/etc/passwd"
          matchActions:
            - action: Post
    ####################################################################



    ####################################################################
    # do_sys_openat2
    - call: "do_sys_openat2"
      syscall: false
      args:
        - index: 1
          type: "string"
        - index: 2
          type: "uint64"
      selectors:
        - matchArgs:
          - index: 1
            operator: "Prefix"
            values:
              - "/var/run/secrets/kubernetes.io/serviceaccount/"
              - "/dev/sd"
              - "/dev/vd"
              - "/dev/nvme"
              - "/dev/dm-"
              - "/mnt/"
              - "/sys/devices/system/cpu"
              - "/sys/bus/cpu/devices"
              - "/proc/cpuinfo"
              - "/sys/kernel/mm/hugepages"
              - "/proc/sys/vm/nr_hugepages"
              - "/dev/cpu"
              - "/dev/zero"
              - "/dev/urandom"
              - "/dev/random"
          matchActions:
            - action: Post

        - matchArgs:
          - index: 1
            operator: "Prefix"
            values:
              - "/etc/cron"
              - "/var/spool/cron"
              - "/etc/systemd/system/"
          - index: 2
            operator: "Mask"
            values: ["0x643"]
          matchActions:
            - action: Post

        - matchArgs:
          - index: 1
            operator: "Prefix"
            values:
              - "/etc/"
              - "/usr/bin/"
              - "/bin/"
              - "/sbin/"
              - "/usr/lib"
          - index: 2
            operator: "Mask"
            values: ["0x3"]
          matchActions:
            - action: Post

        - matchArgs:
          - index: 1
            operator: "Postfix"
            values: 
              - "/docker.sock"
              - "containerd.sock"
              - "id_rsa"
              - "id_ecdsa"
              - "id_ed25519"
              - ".pem"
              - ".key"
              - ".ppk"
              - ".kube/config"
              - .netrc
              - ".bash_history"
              - ".zsh_history"
              - ".sh_history"
              - "kallsyms"
          matchActions:
            - action: Post

        - matchArgs:
          - index: 1
            operator: "Postfix"
            values:
              - ".so"
              - ".py"
              - ".sh"
              - ".php"
              - "core_pattern"
              - "authorized_keys"
          - index: 2
            operator: "Mask"
            values: ["0x3"]
          matchActions:
            - action: Post
    ####################################################################



    ####################################################################
    # vfs_write
    - call: "vfs_write"
      syscall: false
      data:
        - index: 0
          type: "string"
          source: "current_task"
          resolve: "comm"
      args:
        - index: 0
          type: "file"
        - index: 1
          type: "char_buf"
          sizeArgIndex: 2
      selectors:
        - matchBinaries: [{operator: "In", values: ["/usr/bin/curl", "/usr/bin/wget", "/bin/curl", "/bin/wget"]}]
          matchArgs:
            - index: 0
              operator: "Prefix"
              values: ["/tmp/", "/var/tmp/", "/dev/shm/"]
          matchActions:
            - action: Post

        - matchArgs:
          - index: 0
            operator: "Postfix"
            values:
              - ".service"
          matchActions:
            - action: Post

        - matchArgs:
          - index: 0
            operator: "Prefix"
            values: 
              - "/etc/cron"
              - "/var/spool/cron"
              - "/etc/systemd/system/"
              - "/etc/init.d"
          matchActions:
            - action: Post
    ####################################################################



    ####################################################################
    # sys_fchmodat : 파일 실행 권한 이벤트
    # Execution T1204
    - call: "sys_fchmodat"
      syscall: true
      args:
        - index: 1
          type: "string" # 파일 경로
        - index: 2
          type: "int"    # 권한 모드
      selectors:
        - matchArgs:
          - index: 1
            operator: "Prefix"
            values: ["/tmp/", "/var/tmp/", "/dev/shm/"]
          matchActions:
            - action: Post
    ####################################################################
    


    ####################################################################
    # sys_file_permission : 주요 계정/권한 설정 파일에 대한 쓰기 접근 탐지
    # Persistence T1136
    - call: "security_file_permission"
      syscall: false
      args:
        - index: 0
          type: "file" # 지원되는 파일 객체 타입
        - index: 1
          type: "int"  # 접근 권한 Mask
      selectors:
        - matchArgs:
            - index: 0
              operator: "Equal"
              values: ["/etc/passwd"]
            - index: 1
              operator: "Mask"
              values: ["2"]
          matchActions:
            - action: Post

        - matchArgs:
            - index: 0
              operator: "Equal"
              values: ["/etc/shadow"]
            - index: 1
              operator: "Mask"
              values: ["2"]
          matchActions:
            - action: Post

        - matchArgs:
            - index: 0
              operator: "Equal"
              values: ["/etc/sudoers"]
            - index: 1
              operator: "Mask"
              values: ["2"]
          matchActions:
            - action: Post
    ####################################################################



    ####################################################################
    # do_unlinkat
    - call: "do_unlinkat"
      syscall: false
      args:
        - index: 1
          type: "string"
      selectors:
        - matchArgs:
          - index: 1
            operator: "Prefix"
            values:
              - "/etc/"
              - "/boot/"
              - "/var/lib/"
              - "/var/spool/cron"
              - "/var/backups"
              - "/mnt/"
              - "/backup"
          matchActions:
            - action: Post

        - matchArgs:
          - index: 1
            operator: "Postfix"
            values:
              - "syslog"
              - ".log"
              - "auth.log"
              - ".bash_history"
              - ".db"
              - ".sql"
              - ".yaml"
              - ".conf"
              - ".bak"
              - ".snap"
              - "passwd"
              - "shadow"
          matchActions:
            - action: Post
    ####################################################################



    ####################################################################
    # sys_rmdir
    - call: "sys_rmdir"
      syscall: true
      args:
        - index: 0
          type: "string"
      selectors:
        - matchArgs:
          - index: 0
            operator: "Prefix"
            values:
              - "/boot/"
              - "/etc/"
              - "/var/"
              - "/mnt/"
              - "/usr/"
              - "/backup"
          matchActions:
            - action: Post
    ####################################################################



    ####################################################################
    # sys_mount
    - call: "sys_mount"
      syscall: true
      selectors:
        - matchActions:
          - action: Post
    ####################################################################
    


    ####################################################################
    # sys_renameat2
    - call: "sys_renameat2"
      syscall: true
      args:
        - index: 1
          type: "string"
        - index: 3
          type: "string"
      selectors:
        - matchArgs:
          - index: 3
            operator: "Prefix"
            values:
              - "/etc/cron"
              - "/var/spool/cron"
              - "/etc/systemd/system/"
          matchActions:
            - action: Post
    ####################################################################