apiVersion: cilium.io/v1alpha1
kind: TracingPolicyNamespaced
metadata:
  name: "initial-access-t1190"
  namespace: "public-service"
spec:
  # 탐지 대상 >> public-service namespace에 web이라는 이름으로 시작하는 pod
  podSelector:
    matchLabels:
      app: "web"
  kprobes:
  # =========================================================================================
  # 1. node process가 /npm, /next 실행 제외 (화이트 리스트 기반 정책)
  # 어플리케이션 관련 프로세스를 제외하고 나머지 프로세스 실행 식별
  # =========================================================================================
  - call: "sys_execve"
    syscall: true
    args:
    - index: 0
      type: "string"
    selectors:
    - matchBinaries:
      - operator: "In"
        values:
        - "/usr/local/bin/node"
        # =========================================================================================
        # followChildren을 true로 설정하여 자식 프로세스의 동작을 추적한다.
        # 이를 통해 RCE 공격으로 어떤 명령을 수행했는지 확보 가능.
        # 바로 shell 관련 process를 실행하지 않는 공격도 탐지 가능 (Shell Evasion 공격 가시성 확보)
        # =========================================================================================
        followChildren: true
      matchArgs:
      - index: 0
        operator: "NotEqual"
        values:
        - "/usr/local/bin/node"
      - index: 0
        operator: "NotPostfix"
        values:
        - "/npm"
      - index: 0
        operator: "NotPostfix"
        values:
        - "/next"